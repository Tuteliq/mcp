name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Audit dependencies
        # Fail the build on high/critical CVEs. Moderate/low surface in the
        # output but don't block — used for vulns where upstream hasn't
        # published a fix yet. Patchable vulnerabilities are pinned via
        # `overrides` in package.json.
        run: npm audit --omit=dev --audit-level=high

      - name: Check package
        run: npm pack --dry-run
